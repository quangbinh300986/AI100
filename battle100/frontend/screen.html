<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=3840, initial-scale=1.0" />
    <!-- 加载Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>百日奋战 - 数据大屏</title>
    <script>
      // 4K大屏rem基准自适应
      (function () {
        function setRem() {
          var screenWidth = document.documentElement.clientWidth || window.innerWidth;
          document.documentElement.style.fontSize = (screenWidth / 3840 * 16) + 'px';
        }
        setRem();
        window.addEventListener('resize', setRem);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/apps/screen/main.tsx"></script>
  </body>
</html>
